<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pesanan - Kedai Nyonya Rumah</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f4f4f4;
    }

    /* HEADER */

    header{
      background:darkgreen;
      color:white;
      padding:15px 30px;

      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    header h1{
      font-size:30px;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin-left:20px;
      font-weight:bold;
    }

    nav a:hover{
      color:yellow;
    }

    /* CONTAINER */

    .container{

      width:450px;

      background:white;

      margin:40px auto;

      padding:30px;

      border-radius:10px;

      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    .container h2{
      text-align:center;
      margin-bottom:20px;
      color:darkgreen;
    }

    label{
      font-weight:bold;
    }

    input, select, textarea{

      width:100%;

      padding:12px;

      margin-top:5px;
      margin-bottom:15px;

      border:1px solid gray;

      border-radius:5px;
    }

    button{

      width:100%;

      padding:12px;

      border:none;

      background:green;

      color:white;

      font-size:16px;

      font-weight:bold;

      border-radius:5px;

      cursor:pointer;
    }

    button:hover{
      background:darkgreen;
    }

    /* HASIL */

    .hasil{

      margin-top:20px;

      background:#e8ffe8;

      padding:15px;

      border-radius:5px;

      display:none;
    }

    footer{

      background:darkgreen;

      color:white;

      text-align:center;

      padding:15px;

      margin-top:40px;
    }

  </style>
</head>
<body>

  <!-- HEADER -->

  <header>

    <h1>Kedai Nyonya Rumah</h1>

    <nav>

      <a href="index.html">Beranda</a>

      <a href="pesanan.html">Pesanan</a>

      <a href="pembayaran.html">Pembayaran</a>

      <a href="login.html">Logout</a>

    </nav>

  </header>

  <!-- FORM PESANAN -->

  <div class="container">

    <h2>Form Pesanan</h2>

    <!-- NAMA -->
    <label>Nama Pemesan</label>

    <input type="text" id="nama" placeholder="Masukkan nama">

    <!-- MENU -->
    <label>Pilih Menu</label>

    <select id="menu">

      <option>Nasi Goreng</option>

      <option>Nasi Campur Bali</option>

      <option>Nasi Tongseng</option>

    </select>

    <!-- JUMLAH -->
    <label>Jumlah Pesanan</label>

    <input type="number" id="jumlah" placeholder="Masukkan jumlah">

    <!-- ALAMAT -->
    <label>Alamat</label>

    <textarea id="alamat" placeholder="Masukkan alamat"></textarea>

    <!-- BUTTON -->
    <button onclick="pesan()">

      Pesan Sekarang

    </button>

    <!-- HASIL -->
    <div class="hasil" id="hasil">

      <h3>Pesanan Berhasil ✅</h3>

      <br>

      <p id="detail"></p>

    </div>

  </div>

  <!-- FOOTER -->

  <footer>

    @KedaiNyonyaRumah

  </footer>

  <!-- JAVASCRIPT -->

  <script>

    function pesan(){

      let nama = document.getElementById("nama").value;

      let menu = document.getElementById("menu").value;

      let jumlah = document.getElementById("jumlah").value;

      let alamat = document.getElementById("alamat").value;

      if(nama == "" || jumlah == "" || alamat == ""){

        alert("Data belum lengkap!");

      }

      else{

        document.getElementById("hasil").style.display = "block";

        document.getElementById("detail").innerHTML =

        "Nama : " + nama + "<br>" +

        "Menu : " + menu + "<br>" +

        "Jumlah : " + jumlah + "<br>" +

        "Alamat : " + alamat;

      }

    }

  </script>

</body>
</html>
